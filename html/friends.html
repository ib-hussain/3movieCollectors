<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Friends - 3movCollectors</title>

    <!-- Shared CSS -->
    <link rel="stylesheet" href="../css/main-navbar.css" />
    <link rel="stylesheet" href="../css/side-panel.css" />
    <link rel="stylesheet" href="../css/main-footer.css" />

    <!-- Page CSS -->
    <link rel="stylesheet" href="../css/friends.css" />

    <link rel="icon" href="../pictures/M.png" />
  </head>

  <body data-page="friends">
    <!-- NAVBAR -->
    <div id="navbar-container"></div>
    <script src="../js/include-main-navbar.js" defer></script>

    <!-- MAIN WRAPPER -->
    <div class="layout-wrapper">
      <!-- SIDEPANEL -->
      <div id="sidepanel-container"></div>
      <script src="../js/include-side-panel.js" defer></script>

      <!-- MAIN CONTENT -->
      <main class="content-area">
        <div class="friends-main">
          <!-- HEADER -->
          <section class="friends-header">
            <div>
              <h1>Friends</h1>
              <p>View your friends, requests and suggestions</p>
            </div>
          </section>

          <!-- SEARCH -->
          <section class="friends-search-section">
            <div class="friends-search">
              <img
                src="../pictures/search.png"
                class="friends-search-icon"
                alt=""
              />
              <input
                type="text"
                placeholder="Search friends."
                aria-label="Search friends"
              />
            </div>
          </section>

          <!-- TABS -->
          <section class="friends-tabs-wrapper">
            <div class="friends-tabs" role="tablist">
              <button
                class="friends-tab friends-tab--active"
                data-tab="all-friends"
                role="tab"
                aria-selected="true"
              >
                <img
                  src="../pictures/friends.png"
                  class="friends-tab-icon"
                  alt=""
                />
                <span>All Friends (<span id="friends-count">0</span>)</span>
              </button>

              <button
                class="friends-tab"
                data-tab="friend-requests"
                role="tab"
                aria-selected="false"
              >
                <img
                  src="../pictures/friend-request.png"
                  class="friends-tab-icon"
                  alt=""
                />
                <span>Requests (<span id="requests-count">0</span>)</span>
              </button>

              <button
                class="friends-tab"
                data-tab="suggestions"
                role="tab"
                aria-selected="false"
              >
                <img
                  src="../pictures/friend.png"
                  class="friends-tab-icon"
                  alt=""
                />
                <span>Suggestions (<span id="suggestions-count">0</span>)</span>
              </button>
            </div>

            <!-- TAB PANELS -->
            <div class="friends-tab-panels">
              <!-- TAB: ALL FRIENDS -->
              <div
                class="friends-tab-panel friends-tab-panel--active"
                id="all-friends"
                role="tabpanel"
              >
                <div class="friend-grid" id="friends-grid">
                  <!-- Friends will be loaded dynamically -->
                </div>
              </div>

              <!-- TAB: REQUESTS -->
              <div
                class="friends-tab-panel"
                id="friend-requests"
                role="tabpanel"
              >
                <div class="friend-requests-list" id="requests-grid">
                  <!-- Friend requests will be loaded dynamically -->
                </div>
              </div>

              <!-- TAB: SUGGESTIONS -->
              <div class="friends-tab-panel" id="suggestions" role="tabpanel">
                <div
                  class="friend-grid friend-grid--suggestions"
                  id="suggestions-grid"
                >
                  <!-- Friend suggestions will be loaded dynamically -->
                </div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <!-- FOOTER -->
    <div id="footer-container"></div>
    <script src="../js/include-footer.js" defer></script>

    <!-- API Helper -->
    <script src="../js/app.js" defer></script>

    <!-- PAGE JS -->
    <script src="../js/friends.js" defer></script>
  </body>
</html>
