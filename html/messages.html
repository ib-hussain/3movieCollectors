<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Messages – 3movCollectors</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="../pictures/M.png" />

    <!-- Shared styles -->
    <link rel="stylesheet" href="../css/main-navbar.css" />
    <link rel="stylesheet" href="../css/side-panel.css" />
    <link rel="stylesheet" href="../css/main-footer.css" />

    <!-- Page styles -->
    <link rel="stylesheet" href="../css/messages.css?v=2" />
  </head>

  <body data-page="messages">
    <!-- NAVBAR -->
    <div id="navbar-container"></div>
    <script src="../js/include-main-navbar.js" defer></script>

    <div class="layout-wrapper">
      <!-- SIDEPANEL -->
      <div id="sidepanel-container"></div>
      <script src="../js/include-side-panel.js" defer></script>

      <!-- MAIN CONTENT -->
      <main class="content-area">
        <div class="messages-main">
          <!-- PAGE HEADER -->
          <header class="messages-header">
            <h1 class="page-title">Messages</h1>
          </header>

          <!-- GRID LAYOUT -->
          <section
            class="messages-layout messages-layout--empty"
            id="messagesLayout"
          >
            <!-- LEFT: THREAD LIST -->
            <aside class="thread-list">
              <div class="thread-list-header">
                <h2 class="thread-list-title">Messages</h2>

                <div class="thread-search">
                  <input
                    class="thread-search-input"
                    type="text"
                    placeholder="Search conversations..."
                    disabled
                  />
                </div>
              </div>

              <ul class="thread-items">
                <!-- Threads will be loaded dynamically -->
              </ul>
            </aside>

            <!-- RIGHT: EMPTY STATE -->
            <section class="conversation-panel conversation-panel--empty">
              <div class="conversation-empty">
                <img
                  src="../pictures/paper-plane.png"
                  alt=""
                  class="conversation-empty-icon"
                />
                <h2 class="conversation-empty-title">Your messages</h2>
                <p class="conversation-empty-text">
                  Select a conversation from the left to start chatting.
                </p>
              </div>
            </section>

            <!-- RIGHT: ACTIVE CHAT -->
            <section class="conversation-panel conversation-panel--active">
              <!-- Chat header -->
              <header class="conversation-header">
                <div class="conversation-user">
                  <div class="conversation-avatar">
                    <img src="../pictures/user.png" alt="User" />
                  </div>
                  <div class="conversation-user-meta">
                    <span class="conversation-name">Select a conversation</span>
                    <span class="conversation-status"> ⬤ </span>
                  </div>
                </div>
              </header>

              <!-- Chat body -->
              <div class="conversation-body">
                <!-- Messages will be loaded dynamically -->
              </div>

              <!-- Chat input -->
              <form class="conversation-input-row" action="javascript:void(0);">
                <div class="conversation-input-wrap">
                  <input
                    class="conversation-input"
                    type="text"
                    placeholder="Type a message..."
                    disabled
                  />
                </div>

                <button type="button" class="conversation-send-btn">
                  <img src="../pictures/paper-plane.png" alt="Send" />
                </button>
              </form>
            </section>
          </section>
        </div>
      </main>
    </div>

    <!-- App.js for API helper -->
    <script src="../js/app.js"></script>

    <!-- PAGE JS -->
    <script src="../js/messages.js" defer></script>
  </body>
</html>
