<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audit Log - 3movieCollectors Admin</title>
    <link rel="stylesheet" href="../../css/admin/admin-dashboard.css" />
    <link rel="stylesheet" href="../../css/admin/admin-audit.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="admin-container">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <i class="fas fa-film"></i>
          <h2>Admin Panel</h2>
        </div>
        <nav class="sidebar-nav">
          <a href="admin-dashboard.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Dashboard</span>
          </a>
          <a href="admin-users.html" class="nav-item">
            <i class="fas fa-users"></i>
            <span>Users</span>
          </a>
          <a href="admin-movies.html" class="nav-item">
            <i class="fas fa-film"></i>
            <span>Movies</span>
          </a>
          <a href="admin-moderation.html" class="nav-item">
            <i class="fas fa-shield-alt"></i>
            <span>Moderation</span>
          </a>
          <a href="admin-reports.html" class="nav-item">
            <i class="fas fa-chart-bar"></i>
            <span>Reports</span>
          </a>
          <a href="admin-audit.html" class="nav-item active">
            <i class="fas fa-history"></i>
            <span>Audit Log</span>
          </a>
        </nav>
        <button class="btn btn-logout" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </button>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Top Bar -->
        <header class="top-bar">
          <h1>Audit Log</h1>
          <div class="top-bar-actions">
            <div
              class="notification-bell"
              id="notificationBtn"
              title="Notifications"
            >
              <i class="fas fa-bell"></i>
              <span class="notification-count" id="notificationCount">0</span>
            </div>
            <div class="admin-profile">
              <i class="fas fa-user-shield"></i>
              <span id="adminName">Admin</span>
            </div>
          </div>
        </header>

        <!-- Content -->
        <div class="content-wrapper">
          <!-- Filters Section -->
          <section class="filters-section">
            <div class="filters-container">
              <div class="filter-group">
                <label for="operationFilter">Operation</label>
                <select id="operationFilter" class="filter-select">
                  <option value="">All Operations</option>
                  <option value="INSERT">Insert</option>
                  <option value="UPDATE">Update</option>
                  <option value="DELETE CONTENT">Delete Content</option>
                  <option value="MODERATION">Moderation</option>
                  <option value="MANAGEMENT">Management</option>
                  <option value="REPORT CREATION">Report Creation</option>
                  <option value="VIEW RESTRICTED CONTENT">
                    View Restricted Content
                  </option>
                </select>
              </div>

              <div class="filter-group">
                <label for="tableFilter">Table</label>
                <select id="tableFilter" class="filter-select">
                  <option value="">All Tables</option>
                  <option value="User">User</option>
                  <option value="Movie">Movie</option>
                  <option value="Post">Post</option>
                  <option value="Comments">Comments</option>
                  <option value="ReviewRatings">ReviewRatings</option>
                  <option value="FlaggedContent">FlaggedContent</option>
                  <option value="RestrictedWords">RestrictedWords</option>
                  <option value="Messages">Messages</option>
                </select>
              </div>

              <div class="filter-group">
                <label for="startDate">From Date</label>
                <input type="date" id="startDate" class="filter-input" />
              </div>

              <div class="filter-group">
                <label for="endDate">To Date</label>
                <input type="date" id="endDate" class="filter-input" />
              </div>

              <div class="filter-group">
                <button class="btn btn-primary" id="applyFiltersBtn">
                  <i class="fas fa-filter"></i>
                  Apply Filters
                </button>
                <button class="btn btn-secondary" id="clearFiltersBtn">
                  <i class="fas fa-times"></i>
                  Clear
                </button>
              </div>
            </div>
          </section>

          <!-- Audit Log Table -->
          <section class="audit-log-section">
            <div class="table-card">
              <div class="table-header">
                <h3>Audit Log Entries</h3>
                <div class="table-actions">
                  <button class="btn btn-sm btn-success" id="exportCsvBtn">
                    <i class="fas fa-file-csv"></i>
                    Export CSV
                  </button>
                  <button class="btn btn-sm btn-danger" id="exportPdfBtn">
                    <i class="fas fa-file-pdf"></i>
                    Export PDF
                  </button>
                </div>
              </div>
              <div class="table-container">
                <table class="data-table">
                  <thead>
                    <tr>
                      <th>Log ID</th>
                      <th>Admin</th>
                      <th>Operation</th>
                      <th>Table</th>
                      <th>Record ID</th>
                      <th>Timestamp</th>
                    </tr>
                  </thead>
                  <tbody id="audit-log-tbody">
                    <tr>
                      <td colspan="6" class="loading">Loading audit log...</td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <!-- Pagination -->
              <div class="pagination-container">
                <div class="pagination-info" id="paginationInfo">
                  Showing 0 - 0 of 0 entries
                </div>
                <div class="pagination-controls">
                  <button
                    class="btn btn-sm btn-secondary"
                    id="prevPageBtn"
                    disabled
                  >
                    <i class="fas fa-chevron-left"></i>
                    Previous
                  </button>
                  <span class="page-indicator" id="pageIndicator"
                    >Page 1 of 1</span
                  >
                  <button class="btn btn-sm btn-secondary" id="nextPageBtn">
                    Next
                    <i class="fas fa-chevron-right"></i>
                  </button>
                </div>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script src="/js/admin/admin-audit.js"></script>
  </body>
</html>
