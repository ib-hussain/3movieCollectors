              <div class="profile-header-actions">
                <button
                  id="profile-edit-btn"
                  class="profile-edit-btn"
                  style="display: none"

                    alt="edit icon"
                    class="edit-icon"
                  />

              </div>

              <article class="profile-stat-card">

                <span class="profile-stat-label">Reviews</span>
              </article>
              <article class="profile-stat-card">
                <span id="stat-friends" class="profile-stat-value">0</span>
                <span class="profile-stat-label">Friends</span>
              </article>
              <article class="profile-stat-card">
                <span id="stat-watchlist" class="profile-stat-value">0</span>
                <span class="profile-stat-label">Watchlist</span>
              </article>
            </section>

            <!-- GENRES + TABS CONTAINER -->

    <!-- Profile Picture Modal -->
    <div id="profile-picture-modal" class="modal" style="display: none">

        <span class="modal-close">&times;</span>
        <h2>Update Profile Picture</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 15px">

          id="profile-picture-url"
          placeholder="e.g., https://i.pravatar.cc/300 or /pictures/user.jpg"
