<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Notifications - 3movCollectors</title>

    <!-- Shared global components -->
    <link rel="stylesheet" href="../css/main-navbar.css" />
    <link rel="stylesheet" href="../css/side-panel.css" />
    <link rel="stylesheet" href="../css/main-footer.css" />

    <!-- Page stylesheet -->
    <link rel="stylesheet" href="../css/notifications.css" />

    <link rel="icon" href="../pictures/M.png" />
  </head>

  <body data-page="notifications">
    <!-- NAVBAR -->
    <div id="navbar-container"></div>
    <script src="../js/include-main-navbar.js" defer></script>

    <div class="layout-wrapper">
      <!-- SIDEBAR -->
      <div id="sidepanel-container"></div>
      <script src="../js/include-side-panel.js" defer></script>

      <!-- MAIN CONTENT -->
      <main class="content-area">
        <div class="notifications-main">
          <!-- HEADER -->
          <header class="notifications-header">
            <div class="notifications-left">
              <h1>Notifications</h1>
              <p class="notifications-count">
                <span id="unreadCount">0</span> unread notifications
              </p>
            </div>

            <button class="mark-all-read-btn">Mark all as read</button>
          </header>

          <!-- TABS -->
          <section class="notifications-tabs-section">
            <div class="notifications-tabs" role="tablist">
              <button
                class="notifications-tab notifications-tab--active"
                data-tab="all"
                role="tab"
                aria-selected="true"
              >
                All (<span id="allCount">0</span>)
              </button>

              <button
                class="notifications-tab"
                data-tab="unread"
                role="tab"
                aria-selected="false"
              >
                Unread (<span id="unreadTabCount">0</span>)
              </button>
            </div>
          </section>

          <!-- NOTIFICATION LIST -->
          <section class="notifications-section">
            <div class="notification-list" id="notificationsContainer">
              <!-- Notifications will be loaded dynamically -->
            </div>
          </section>
        </div>
      </main>
    </div>

    <!-- FOOTER -->
    <div id="footer-container"></div>
    <script src="../js/include-footer.js" defer></script>

    <!-- Global App JS -->
    <script src="../js/app.js"></script>

    <!-- PAGE JS -->
    <script src="../js/notifications.js" defer></script>
  </body>
</html>
