<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Events - 3movCollectors</title>

    <!-- Shared Components -->
    <link rel="stylesheet" href="../css/main-navbar.css" />
    <link rel="stylesheet" href="../css/side-panel.css" />
    <link rel="stylesheet" href="../css/main-footer.css" />
    <link rel="stylesheet" href="../css/modal.css" />

    <!-- Page CSS -->
    <link rel="stylesheet" href="../css/events.css" />

    <link rel="icon" href="../pictures/M.png" />
  </head>

  <body data-page="events">
    <!-- NAVBAR -->
    <div id="navbar-container"></div>
    <script src="../js/include-main-navbar.js" defer></script>

    <!-- MAIN LAYOUT -->
    <div class="layout-wrapper">
      <!-- SIDEBAR -->
      <div id="sidepanel-container"></div>
      <script src="../js/include-side-panel.js" defer></script>

      <!-- CONTENT AREA -->
      <main class="content-area">
        <div class="events-main">
          <!-- HEADER -->
          <section class="events-header">
            <div>
              <h1>Events</h1>
              <p>Discover, host and join events with friends</p>
            </div>

            <button class="events-host-btn">
              <span class="events-host-icon">
                <img src="../pictures/check-in-calendar.png" alt="plus" />
              </span>
              Host Event
            </button>
          </section>

          <!-- TABS -->
          <section class="events-tabs-section">
            <div class="events-tabs" role="tablist">
              <button
                class="events-tab events-tab--active"
                data-tab="events-upcoming"
                role="tab"
                aria-selected="true"
              >
                Upcoming Events
              </button>

              <button
                class="events-tab"
                data-tab="events-hosting"
                role="tab"
                aria-selected="false"
              >
                Hosted by Me
              </button>

              <button
                class="events-tab"
                data-tab="events-past"
                role="tab"
                aria-selected="false"
              >
                Past Events
              </button>
            </div>

            <!-- PANELS -->
            <div class="events-tab-panels">
              <!-- TAB 1: UPCOMING EVENTS -->
              <div
                class="events-tab-panel events-tab-panel--active"
                id="events-upcoming"
                role="tabpanel"
              >
                <!-- Events will be loaded dynamically by JavaScript -->
              </div>

              <!-- TAB 2: HOSTED BY ME -->
              <div class="events-tab-panel" id="events-hosting" role="tabpanel">
                <!-- Events will be loaded dynamically by JavaScript -->
              </div>

              <!-- TAB 3: PAST EVENTS -->
              <div class="events-tab-panel" id="events-past" role="tabpanel">
                <!-- Events will be loaded dynamically by JavaScript -->
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <!-- FOOTER -->
    <div id="footer-container"></div>
    <script src="../js/include-footer.js" defer></script>

    <!-- PAGE JS -->
    <script src="../js/app.js" defer></script>
    <script src="../js/events.js" defer></script>
  </body>
</html>
