<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title id="page-title">Movie Details – 3movieCollectors</title>

    <!-- Shared Layout Components -->
    <link rel="stylesheet" href="../css/main-navbar.css" />
    <link rel="stylesheet" href="../css/side-panel.css" />
    <link rel="stylesheet" href="../css/main-footer.css" />

    <!-- Page Styles -->
    <link rel="stylesheet" href="../css/movie.css" />

    <link rel="icon" href="../pictures/M.png" />
  </head>

  <body data-page="movie">
    <!-- NAVBAR -->
    <div id="navbar-container"></div>
    <script src="../js/app.js" defer></script>
    <script src="../js/include-main-navbar.js" defer></script>

    <div class="layout-wrapper">
      <!-- SIDEBAR -->
      <div id="sidepanel-container"></div>
      <script src="../js/include-side-panel.js" defer></script>

      <!-- MAIN CONTENT -->
      <div class="content-area">
        <main class="movie-main">
          <!-- ========== HEADER ========== -->
          <section class="movie-header">
            <div class="movie-poster-box">
              <img
                id="movie-poster"
                src="../pictures/white.png"
                class="movie-poster"
                alt="Movie Poster"
              />
            </div>

            <div class="movie-info-box">
              <h1 id="movie-title">Loading...</h1>

              <div class="movie-meta" id="movie-meta">
                <span id="movie-year">-</span>
                <span class="dot">•</span>
                <span id="movie-director">-</span>
                <span class="dot">•</span>
                <span id="movie-rating">-</span> ⭐
              </div>

              <div class="movie-genres" id="movie-genres">
                <!-- Genres will be dynamically loaded -->
              </div>

              <button
                id="watchlist-btn"
                class="watchlist-btn"
                style="
                  margin: 15px 0;
                  padding: 10px 20px;
                  background: #e74c3c;
                  color: white;
                  border: none;
                  border-radius: 5px;
                  cursor: pointer;
                  font-size: 14px;
                "
              >
                <span id="watchlist-text">Add to Watchlist</span>
              </button>

              <!-- TABS -->
              <div class="overview-tabs">
                <button class="tab active" data-target="overview-section">
                  Overview
                </button>
                <button class="tab" data-target="reviews-section">
                  Reviews (<span id="reviews-count">0</span>)
                </button>
                <button class="tab" data-target="discussion-section">
                  Discussion (<span id="discussion-count">0</span>)
                </button>
              </div>
            </div>
          </section>

          <!-- ========== OVERVIEW CONTENT ========== -->
          <section id="overview-section" class="tab-content active">
            <div class="movie-section">
              <h2>Plot Summary</h2>
              <p id="movie-synopsis">Loading movie details...</p>
            </div>

            <div class="movie-section">
              <h2>More Like This</h2>
              <div class="similar-grid" id="similar-movies">
                <!-- Similar movies will be dynamically loaded -->
              </div>
            </div>
          </section>

          <!-- ========== REVIEWS SECTION (Hidden by default) ========== -->
          <section id="reviews-section" class="tab-content">
            <!-- Rating Summary -->
            <div class="reviews-summary">
              <div class="rating-overview">
                <div class="rating-number">
                  <span id="avg-rating">0.0</span>
                  <div class="rating-stars">⭐⭐⭐⭐⭐</div>
                  <p class="rating-count">
                    <span id="total-reviews">0</span> reviews
                  </p>
                </div>
                <div class="rating-distribution">
                  <div class="rating-bar" data-rating="10">
                    <span class="rating-label">10</span>
                    <div class="bar-container">
                      <div class="bar-fill" style="width: 0%"></div>
                    </div>
                    <span class="rating-percent">0%</span>
                  </div>
                  <div class="rating-bar" data-rating="9">
                    <span class="rating-label">9</span>
                    <div class="bar-container">
                      <div class="bar-fill" style="width: 0%"></div>
                    </div>
                    <span class="rating-percent">0%</span>
                  </div>
                  <div class="rating-bar" data-rating="8">
                    <span class="rating-label">8</span>
                    <div class="bar-container">
                      <div class="bar-fill" style="width: 0%"></div>
                    </div>
                    <span class="rating-percent">0%</span>
                  </div>
                  <div class="rating-bar" data-rating="7">
                    <span class="rating-label">7</span>
                    <div class="bar-container">
                      <div class="bar-fill" style="width: 0%"></div>
                    </div>
                    <span class="rating-percent">0%</span>
                  </div>
                  <div class="rating-bar" data-rating="6">
                    <span class="rating-label">6</span>
                    <div class="bar-container">
                      <div class="bar-fill" style="width: 0%"></div>
                    </div>
                    <span class="rating-percent">0%</span>
                  </div>
                  <div class="rating-bar" data-rating="5">
                    <span class="rating-label">5</span>
                    <div class="bar-container">
                      <div class="bar-fill" style="width: 0%"></div>
                    </div>
                    <span class="rating-percent">0%</span>
                  </div>
                  <div class="rating-bar" data-rating="4">
                    <span class="rating-label">4</span>
                    <div class="bar-container">
                      <div class="bar-fill" style="width: 0%"></div>
                    </div>
                    <span class="rating-percent">0%</span>
                  </div>
                  <div class="rating-bar" data-rating="3">
                    <span class="rating-label">3</span>
                    <div class="bar-container">
                      <div class="bar-fill" style="width: 0%"></div>
                    </div>
                    <span class="rating-percent">0%</span>
                  </div>
                  <div class="rating-bar" data-rating="2">
                    <span class="rating-label">2</span>
                    <div class="bar-container">
                      <div class="bar-fill" style="width: 0%"></div>
                    </div>
                    <span class="rating-percent">0%</span>
                  </div>
                  <div class="rating-bar" data-rating="1">
                    <span class="rating-label">1</span>
                    <div class="bar-container">
                      <div class="bar-fill" style="width: 0%"></div>
                    </div>
                    <span class="rating-percent">0%</span>
                  </div>
                </div>
              </div>
            </div>

            <!-- Write Review Form -->
            <div id="review-form-box" class="review-form-box">
              <h3>Write Your Review</h3>
              <div class="rating-input">
                <label>Your Rating:</label>
                <div class="rating-select">
                  <select id="review-rating">
                    <option value="">Select rating...</option>
                    <option value="10">10 - Masterpiece</option>
                    <option value="9">9 - Excellent</option>
                    <option value="8">8 - Very Good</option>
                    <option value="7">7 - Good</option>
                    <option value="6">6 - Fine</option>
                    <option value="5">5 - Average</option>
                    <option value="4">4 - Below Average</option>
                    <option value="3">3 - Bad</option>
                    <option value="2">2 - Very Bad</option>
                    <option value="1">1 - Terrible</option>
                  </select>
                </div>
              </div>
              <textarea
                id="review-text"
                class="review-textarea"
                placeholder="Share your thoughts about this movie... (Required)"
                maxlength="8000"
              ></textarea>
              <div class="review-actions">
                <button id="submit-review-btn" class="submit-review-btn">
                  Submit Review
                </button>
                <button
                  id="cancel-review-btn"
                  class="cancel-review-btn"
                  style="display: none"
                >
                  Cancel
                </button>
              </div>
            </div>

            <!-- User's Existing Review (if any) -->
            <div id="user-review-container" style="display: none">
              <!-- Will be populated dynamically -->
            </div>

            <!-- All Reviews -->
            <div class="reviews-list">
              <h3>User Reviews</h3>
              <div id="reviews-container">
                <!-- Reviews will be loaded dynamically -->
              </div>
            </div>
          </section>

          <!-- ========== DISCUSSION SECTION (Hidden by default) ========== -->
          <section id="discussion-section" class="tab-content">
            <div class="discussion-box">
              <h2 id="discussion-title">Discussion</h2>
              <p class="discussion-sub">
                Share your theories, thoughts, and insights about this film with
                the community.
              </p>

              <!-- Input -->
              <textarea
                id="post-input"
                class="discussion-input"
                placeholder="Share your thoughts about this movie..."
              ></textarea>

              <button id="post-btn" class="post-btn">Post</button>
            </div>

            <!-- Posts List -->
            <div id="posts-container">
              <!-- Posts will be dynamically loaded -->
            </div>
          </section>
        </main>
      </div>
    </div>

    <!-- FOOTER -->
    <div id="footer-container"></div>
    <script src="../js/include-footer.js" defer></script>

    <!-- TAB SWITCHING LOGIC -->
    <script src="../js/movie.js" defer></script>
  </body>
</html>
